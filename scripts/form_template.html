<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>__FORM_TITLE__</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f4f5f7;
      color: #1a1a2e;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: #1a1a2e;
      color: #fff;
      padding: 1.5rem 2rem;
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,.3);
    }
    header h1 { font-size: 1.1rem; font-weight: 600; }
    #progress-bar-wrap {
      width: 200px;
      height: 6px;
      background: rgba(255,255,255,.2);
      border-radius: 3px;
      overflow: hidden;
    }
    #progress-bar {
      height: 100%;
      background: #4fc3f7;
      width: 0%;
      transition: width .3s;
    }

    /* ── Layout ── */
    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 2rem 1rem 6rem;
    }

    /* ── Login screen ── */
    #login-screen {
      background: #fff;
      border-radius: 12px;
      padding: 2.5rem;
      box-shadow: 0 2px 12px rgba(0,0,0,.08);
      max-width: 480px;
      margin: 4rem auto;
    }
    #login-screen h2 { margin-bottom: 1rem; font-size: 1.3rem; }
    #login-screen p  { color: #555; margin-bottom: 1.5rem; font-size: .95rem; }
    select, button {
      width: 100%;
      padding: .75rem 1rem;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 1rem;
      margin-bottom: 1rem;
    }
    button {
      background: #1a1a2e;
      color: #fff;
      border: none;
      cursor: pointer;
      font-weight: 600;
      transition: background .2s;
    }
    button:hover { background: #2d2d4e; }
    button:disabled { background: #aaa; cursor: not-allowed; }

    /* ── Description banner ── */
    #form-description {
      background: #fff;
      border-left: 4px solid #4fc3f7;
      border-radius: 8px;
      padding: 1rem 1.25rem;
      margin-bottom: 1.5rem;
      font-size: .95rem;
      color: #444;
      line-height: 1.5;
      box-shadow: 0 2px 8px rgba(0,0,0,.06);
    }

    /* ── Question group card ── */
    .q-group {
      background: #fff;
      border-radius: 12px;
      padding: 1.75rem 2rem;
      margin-bottom: 1.5rem;
      box-shadow: 0 2px 8px rgba(0,0,0,.06);
    }
    .q-group-header {
      display: flex;
      align-items: baseline;
      gap: .75rem;
      margin-bottom: 1.25rem;
      border-bottom: 2px solid #f0f0f0;
      padding-bottom: .75rem;
    }
    .q-group-id {
      font-size: .75rem;
      font-weight: 700;
      color: #4fc3f7;
      background: #1a1a2e;
      padding: .2rem .5rem;
      border-radius: 4px;
      letter-spacing: .05em;
    }
    .q-group-title { font-size: 1.05rem; font-weight: 600; }
    .q-group-l1 {
      font-size: .8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: #4fc3f7;
      margin-bottom: 1rem;
    }

    /* ── Section heading inside group ── */
    .q-section-heading {
      font-size: .8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: #888;
      margin: 1.25rem 0 .5rem;
    }

    /* ── Single question row ── */
    .q-item {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: .75rem;
      align-items: start;
      padding: .75rem 0;
      border-bottom: 1px solid #f5f5f5;
    }
    .q-item:last-child { border-bottom: none; }

    .q-label { font-size: .95rem; line-height: 1.4; }

    .q-image-wrap {
      margin-top: .5rem;
    }
    .q-image-wrap img {
      max-width: 100%;
      max-height: 220px;
      border-radius: 6px;
      border: 1px solid #e0e0e0;
      cursor: pointer;
      transition: box-shadow .2s;
    }
    .q-image-wrap img:hover { box-shadow: 0 4px 16px rgba(0,0,0,.15); }

    /* ── Rating buttons ── */
    .q-rating {
      display: flex;
      flex-direction: column;
      gap: .35rem;
      min-width: 130px;
    }
    .q-rating label {
      display: flex;
      align-items: center;
      gap: .4rem;
      font-size: .82rem;
      cursor: pointer;
      padding: .3rem .5rem;
      border-radius: 6px;
      transition: background .15s;
    }
    .q-rating label:hover { background: #f0f4ff; }
    .q-rating input[type=radio] { accent-color: #1a1a2e; }
    .q-rating input[type=radio]:checked + span { font-weight: 600; }

    /* ── Lightbox ── */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.85);
      z-index: 999;
      align-items: center;
      justify-content: center;
    }
    #lightbox.open { display: flex; }
    #lightbox img {
      max-width: 92vw;
      max-height: 92vh;
      border-radius: 8px;
      box-shadow: 0 8px 40px rgba(0,0,0,.6);
    }
    #lightbox-close {
      position: absolute;
      top: 1rem;
      right: 1.5rem;
      color: #fff;
      font-size: 2rem;
      cursor: pointer;
      line-height: 1;
    }

    /* ── Submit bar ── */
    #submit-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #fff;
      border-top: 1px solid #e0e0e0;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 -2px 12px rgba(0,0,0,.08);
    }
    #submit-bar span { font-size: .9rem; color: #555; }
    #submit-btn { width: auto; margin: 0; padding: .75rem 2rem; }

    /* ── Status message ── */
    #status-msg {
      text-align: center;
      padding: 1rem;
      border-radius: 8px;
      margin-top: 1rem;
      display: none;
    }
    #status-msg.success { background: #e8f5e9; color: #2e7d32; display: block; }
    #status-msg.error   { background: #ffebee; color: #c62828; display: block; }

    @media (max-width: 600px) {
      .q-item { grid-template-columns: 1fr; }
      .q-rating { flex-direction: row; flex-wrap: wrap; }
    }
  </style>
</head>
<body>

<header>
  <h1>__FORM_TITLE__</h1>
  <div id="progress-bar-wrap"><div id="progress-bar"></div></div>
</header>

<!-- Login -->
<main id="login-screen">
  <h2>Anmeldung</h2>
  <p>Bitte wählen Sie Ihren Namen, um den Fragebogen zu starten.</p>
  <select id="respondent-select">
    <option value="">— Name auswählen —</option>
  </select>
  <button id="start-btn" disabled>Fragebogen starten</button>
</main>

<!-- Form (hidden until login) -->
<main id="form-screen" style="display:none">
  <p id="form-description">__DESCRIPTION__</p>
  <div id="questions-container"></div>
  <div id="status-msg"></div>
</main>

<!-- Submit bar -->
<div id="submit-bar" style="display:none">
  <span id="answered-count">0 von 0 beantwortet</span>
  <button id="submit-btn">Antworten absenden</button>
</div>

<!-- Lightbox -->
<div id="lightbox">
  <span id="lightbox-close">&times;</span>
  <img id="lightbox-img" src="" alt="" />
</div>

<script>
// ── Data injected by build script ────────────────────────────────────────────
const DESCRIPTION = "__DESCRIPTION__";
const QUESTIONS   = __QUESTIONS_JSON__;
const RESPONDENTS = __RESPONDENTS_JSON__;
const WEB_APP_URL = "__WEB_APP_URL__";

// ── Rating scale ─────────────────────────────────────────────────────────────
const RATINGS = [
  { value: "3", label: "Sicher" },
  { value: "2", label: "Grundkenntnisse" },
  { value: "1", label: "Unsicher" },
  { value: "0", label: "Unbekannt" },
];

// ── State ─────────────────────────────────────────────────────────────────────
let currentRespondent = null;
const answers = {};   // key: "groupId_itemIndex" → rating value

// ── Persistence (localStorage) ───────────────────────────────────────────────
function storageKey(email) { return "fragebogen_" + email; }

function saveState() {
  if (!currentRespondent) return;
  localStorage.setItem(storageKey(currentRespondent.email), JSON.stringify(answers));
}

function loadState(email) {
  try {
    const raw = localStorage.getItem(storageKey(email));
    return raw ? JSON.parse(raw) : {};
  } catch { return {}; }
}

function clearState(email) {
  localStorage.removeItem(storageKey(email));
}

// ── Login ─────────────────────────────────────────────────────────────────────
const respondentSelect = document.getElementById("respondent-select");
const startBtn         = document.getElementById("start-btn");

RESPONDENTS.forEach(r => {
  const opt = document.createElement("option");
  opt.value = r.email;
  opt.textContent = r.name;
  // show saved progress indicator
  const saved = loadState(r.email);
  const count = Object.keys(saved).length;
  if (count > 0) opt.textContent += ` (${count} gespeichert)`;
  respondentSelect.appendChild(opt);
});

respondentSelect.addEventListener("change", () => {
  startBtn.disabled = !respondentSelect.value;
});

startBtn.addEventListener("click", () => {
  const email = respondentSelect.value;
  currentRespondent = RESPONDENTS.find(r => r.email === email);
  // restore saved answers
  const saved = loadState(email);
  Object.assign(answers, saved);
  document.getElementById("login-screen").style.display = "none";
  document.getElementById("form-screen").style.display  = "block";
  document.getElementById("submit-bar").style.display   = "flex";
  renderForm();
});

// ── Form rendering ────────────────────────────────────────────────────────────
function renderForm() {
  const container = document.getElementById("questions-container");
  container.innerHTML = "";

  QUESTIONS.forEach(group => {
    const card = document.createElement("div");
    card.className = "q-group";

    // header
    card.innerHTML = `
    ${group.L1 ? `<div class="q-group-l1">${escHtml(group.L1)}</div>` : ''}
      <div class="q-group-header">
        <span class="q-group-id">${group.id}</span>
        <span class="q-group-title">${escHtml(group.L3 || group.category)}</span>
      </div>
      `;

    let lastSection = null;
    group.items.forEach((item, idx) => {
      const key = `${group.id}_${idx}`;

      // section heading
      if (item.section && item.section !== lastSection) {
        lastSection = item.section;
        const sh = document.createElement("div");
        sh.className = "q-section-heading";
        sh.textContent = item.section;
        card.appendChild(sh);
      }

      const row = document.createElement("div");
      row.className = "q-item";

      // left: label + images
      const left = document.createElement("div");
      left.innerHTML = item.label
        ? `<div class="q-label">${escHtml(item.label)}</div>`
        : "";

      if (item.images && item.images.length > 0) {
        const wrap = document.createElement("div");
        wrap.className = "q-image-wrap";
        item.images.forEach(imgName => {
          const img = document.createElement("img");
          img.src = `./images/${imgName}`;
          img.alt = imgName;
          img.loading = "lazy";
          img.addEventListener("click", () => openLightbox(img.src));
          wrap.appendChild(img);
        });
        left.appendChild(wrap);
      }

      // right: rating
      const right = document.createElement("div");
      right.className = "q-rating";
      RATINGS.forEach(r => {
        const id = `${key}_${r.value}`;
        right.innerHTML += `
          <label for="${id}">
            <input type="radio" name="${key}" id="${id}" value="${r.value}" />
            <span>${r.label}</span>
          </label>`;
      });

      // restore saved value
      if (answers[key] !== undefined) {
        const saved = right.querySelector(`input[value="${answers[key]}"]`);
        if (saved) saved.checked = true;
      }

      // listen for changes
      right.querySelectorAll("input[type=radio]").forEach(input => {
        input.addEventListener("change", () => {
          answers[key] = input.value;
          saveState();
          updateProgress();
        });
      });

      row.appendChild(left);
      row.appendChild(right);
      card.appendChild(row);
    });

    container.appendChild(card);
  });

  updateProgress();
}

// ── Progress ──────────────────────────────────────────────────────────────────
function totalItems() {
  return QUESTIONS.reduce((s, g) => s + g.items.length, 0);
}

function updateProgress() {
  const total    = totalItems();
  const answered = Object.keys(answers).length;
  const pct      = total > 0 ? (answered / total) * 100 : 0;
  document.getElementById("progress-bar").style.width = pct + "%";
  document.getElementById("answered-count").textContent =
    `${answered} von ${total} beantwortet`;
}

// ── Submit ────────────────────────────────────────────────────────────────────
document.getElementById("submit-btn").addEventListener("click", async () => {
  const btn = document.getElementById("submit-btn");
  const msg = document.getElementById("status-msg");
  btn.disabled = true;
  btn.textContent = "Wird gesendet…";
  msg.className = "";
  msg.style.display = "none";

  // build structured answers — only include items that were actually rated
  const structured = QUESTIONS
    .map(group => ({
      id:       group.id,
      category: group.category,
      L1:       group.L1,
      L3:       group.L3,
      items:    group.items
        .map((item, idx) => ({
          label:  item.label,
          rating: answers[`${group.id}_${idx}`] ?? null,
        }))
        .filter(item => item.rating !== null),
    }))
    .filter(group => group.items.length > 0);

  const payload = {
    respondent_name:  currentRespondent.name,
    respondent_email: currentRespondent.email,
    submitted_at:     new Date().toISOString(),
    answers:          structured,
  };

  try {
    await fetch(WEB_APP_URL, {
      method:  "POST",
      mode:    "no-cors",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body:    "payload=" + encodeURIComponent(JSON.stringify(payload)),
    });
    // no-cors means we can't read the response — assume success
    // only clear saved state if all items were answered
    const total    = totalItems();
    const answered = Object.keys(answers).length;
    if (answered >= total) {
      clearState(currentRespondent.email);
      msg.textContent = "✓ Alle Antworten wurden erfolgreich gespeichert. Vielen Dank!";
    } else {
      msg.textContent = `✓ ${answered} von ${total} Antworten gespeichert. Sie können den Rest später ergänzen.`;
    }
    msg.className = "success";
    btn.textContent = "Gesendet ✓";
    btn.disabled = false;
  } catch (err) {
    msg.textContent = "Fehler beim Senden: " + err.message;
    msg.className = "error";
    btn.disabled = false;
    btn.textContent = "Erneut versuchen";
  }
});

// ── Lightbox ──────────────────────────────────────────────────────────────────
function openLightbox(src) {
  document.getElementById("lightbox-img").src = src;
  document.getElementById("lightbox").classList.add("open");
}
document.getElementById("lightbox-close").addEventListener("click", () => {
  document.getElementById("lightbox").classList.remove("open");
});
document.getElementById("lightbox").addEventListener("click", e => {
  if (e.target === e.currentTarget)
    document.getElementById("lightbox").classList.remove("open");
});

// ── Utils ─────────────────────────────────────────────────────────────────────
function escHtml(str) {
  return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
</script>
</body>
</html>
